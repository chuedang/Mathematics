<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cat RPG Adventure v3.8</title>
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { touch-action: pan-y; -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
    body { font-family: 'Mitr', sans-serif; background: #e2d1c3; margin: 0; padding: 0; overflow-x: hidden; width: 100vw; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

    /* Login Section */
    #loginPage { background: white; padding: 40px 30px; border-radius: 30px; width: 90%; max-width: 340px; margin-top: 60px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    .login-input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 1px solid #ddd; font-family: 'Mitr'; font-size: 16px; outline: none; }
    #loginBtn { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; font-family: 'Mitr'; font-size: 16px; cursor: pointer; box-shadow: 0 4px 0 #27ae60; }
    #loginBtn:disabled { background: #bdc3c7 !important; color: #7f8c8d !important; box-shadow: 0 4px 0 #95a5a6 !important; cursor: not-allowed; }

    /* Dashboard */
    #dashboard { display: none; flex-direction: column; align-items: center; width: 100%; padding: 20px 0; gap: 20px; }
    .student-card, .inventory-card, .mission-card { background: white; border-radius: 25px; padding: 20px; width: 340px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

    /* Avatar System */
    @keyframes breathe { 0%, 100% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-4px) scale(1.02); } }
    .avatar-container { 
      width: 180px; height: 180px; margin: 0 auto 15px; background: #f9f9f9; border-radius: 50%; 
      position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; 
      border: 5px solid #fff; animation: breathe 3s ease-in-out infinite; cursor: pointer;
    }
    .god-aura { box-shadow: 0 0 20px #f1c40f, 0 0 40px #f39c12 !important; border-color: #f1c40f !important; background: radial-gradient(circle, #fff9e6 0%, #ffffff 100%) !important; }
    #avatar-base { width: auto; height: 85%; z-index: 1; image-rendering: pixelated; }
    #shirt-overlay, #hat-overlay { position: absolute; z-index: 2; display: none; transform: translateX(-50%); pointer-events: none; }
    #full-set-overlay { position: absolute; z-index: 4; display: none; transform: translate(-50%, -50%); left: 50%; top: 50%; }

    /* UI Elements */
    .tab-menu { display: flex; gap: 5px; margin-bottom: 15px; }
    .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; background: #f0f0f0; font-family: 'Mitr'; font-size: 13px; cursor: pointer; }
    .tab-btn.active { background: #3498db; color: white; }
    .tab-content { display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .tab-content.active { display: grid; }
    .item-slot { background: #fafafa; border: 2px solid #eee; border-radius: 15px; padding: 10px; text-align: center; position: relative; transition: 0.2s; }
    .item-slot img { width: 100%; height: 50px; object-fit: contain; }
    .lvl-badge { position: absolute; top: 2px; right: 2px; font-size: 8px; background: #e74c3c; color: white; padding: 2px 4px; border-radius: 5px; }
    .locked { opacity: 0.3; filter: grayscale(1); }
    
    .selected-item { border: 3px solid #3498db !important; background: #ebf5fb !important; transform: scale(1.05); box-shadow: 0 4px 10px rgba(52,152,219,0.3); }

    /* Mission */
    .mission-item { padding: 12px; border-radius: 15px; margin-bottom: 10px; border-left: 8px solid #ccc; font-size: 14px; }
    .status-badge { font-size: 11px; padding: 3px 10px; border-radius: 10px; float: right; color: white; }
    .done-bg { background: #27ae60; }
    .wait-bg { background: #95a5a6; }

    /* Buttons */
    .btn-save { background: #3498db; color: white; border: none; padding: 15px; border-radius: 18px; width: 100%; font-family: 'Mitr'; margin-top: 10px; cursor: pointer; box-shadow: 0 4px 0 #2980b9; }
    .btn-clear { width:100%; background:#95a5a6; color:white; border:none; padding:12px; border-radius:18px; margin-top:10px; font-family:'Mitr'; cursor:pointer; }
    .btn-logout { width:100%; background:none; color:#e74c3c; border:1px dashed #e74c3c; padding:10px; border-radius:18px; margin-top:10px; font-family:'Mitr'; cursor:pointer; }

    #gameOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
    #gameCanvas { background: #87CEEB; border: 4px solid #fff; border-radius: 20px; }
  </style>
</head>
<body>

  <div id="loginPage">
    <h2 style="color: #634d3a;">🐾 Cat RPG</h2>
    <input type="text" id="username" class="login-input" placeholder="รหัสนักเรียน (ID)">
    <input type="password" id="password" class="login-input" placeholder="รหัสผ่าน">
    <button id="loginBtn" onclick="login()" disabled>กำลังโหลดอาณาจักร...</button>
  </div>

  <div id="dashboard">
    <div class="student-card">
      <div class="avatar-container" id="avatarClicker" onclick="handleAvatarClick()">
        <img id="avatar-base" src="https://img1.pic.in.th/images/Gemini_Generated_Image_v4dyj4v4dyj4v4dy-removebg-preview.md.png">
        <img id="shirt-overlay">
        <img id="hat-overlay">
        <img id="full-set-overlay">
      </div>
      <div style="text-align: center;">
        <h3 id="displayName" style="margin: 0; color: #634d3a;">-</h3>
        <p style="margin: 5px 0;"><span style="background: #fff4e6; color: #d35400; padding: 4px 12px; border-radius: 20px; font-size: 14px;">⭐ เลเวล <span id="displayLevel">0</span></span></p>
        <p style="font-size: 14px; color: #7f8c8d;">🏆 คะแนนสะสม: <span id="displayScore">0</span></p>
        <p style="font-size: 13px; color: #95a5a6;">🏫 ชั้นเรียน: <span id="displaySheet">-</span></p>
      </div>
      <button class="btn-save" id="saveBtn" onclick="saveDressing()">💾 บันทึกชุด</button>
      <button class="btn-clear" onclick="clearDressing()">❌ ถอดชุด</button>
      <button class="btn-logout" onclick="location.reload()">🚪 ออกจากเมือง (Logout)</button>
    </div>

    <div class="inventory-card">
      <div class="tab-menu">
        <button class="tab-btn active" onclick="openTab('tab-shirts', this)">เสื้อ</button>
        <button class="tab-btn" onclick="openTab('tab-hats', this)">หมวก</button>
        <button class="tab-btn" onclick="openTab('tab-sets', this)">พิเศษ</button>
      </div>
      <div id="tab-shirts" class="tab-content active"></div>
      <div id="tab-hats" class="tab-content"></div>
      <div id="tab-sets" class="tab-content"></div>
    </div>

    <div class="mission-card" id="mission-list"></div>
  </div>

  <div id="gameOverlay">
    <div style="color:white; text-align:center; margin-bottom:10px;">
      <h2 style="margin:0;">Cat Jump! 🚀</h2>
      <h1 id="gameScoreText" style="color:#f1c40f; font-size:40px; margin:0;">0</h1>
    </div>
    <canvas id="gameCanvas" width="300" height="400" onclick="gameJump()"></canvas>
    <button onclick="closeGame()" style="margin-top:20px; padding:10px 30px; border-radius:15px; background:#e74c3c; color:white; border:none; font-family:'Mitr';">กลับสู่เมือง</button>
  </div>

<script>
  // อัปเดต URL เป็นตัวใหม่ที่คุณส่งมา
  const API_URL = "https://script.google.com/macros/s/AKfycbzYzh1PpI3LBC_MzmIkYUd_ctt659_9uXVGPA0IlVhvg8cIvau0OuTbn7BtrsWaNwHmyA/exec";
  let studentsData = [], currentStudent = null;
  let clickCount = 0, clickTimer = null;
  let activeShirtConfig = null, activeHatConfig = null;

  const shirtLibrary = [
    { id: "s1", name: "เขียวเมี๊ยว", minLvl: 0, url: "https://img2.pic.in.th/Gemini_Generated_Image_4tdjo64tdjo64tdj-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s2", name: "ชมพูเมี๊ยว", minLvl: 5, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_bwizh0bwizh0bwiz-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s3", name: "เหลืองร่าเริง", minLvl: 15, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_3q5fny3q5fny3q5f-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s4", name: "ฟ้าใสเเมี๊ยว", minLvl: 25, url: "https://img2.pic.in.th/Gemini_Generated_Image_r5h5awr5h5awr5h5-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s5", name: "ขาวเเมี๊ยว", minLvl: 35, url: "https://img2.pic.in.th/Gemini_Generated_Image_5t9ee35t9ee35t9e-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s6", name: "ม่วงราตรี", minLvl: 45, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_3rhvou3rhvou3rhv-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s7", name: "เสื้อนินจา", minLvl: 50, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_xwz3ddxwz3ddxwz3-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s8", name: "ผู้ดีอังกฤษ", minLvl: 55, url: "https://img2.pic.in.th/Gemini_Generated_Image_or6ug8or6ug8or6u-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s9", name: "ชุดหรูหรา", minLvl: 60, url: "https://img2.pic.in.th/Gemini_Generated_Image_auy35yauy35yauy3-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s10", name: "จักรพรรดิ", minLvl: 65, url: "https://img2.pic.in.th/Gemini_Generated_Image_yezjphyezjphyezj-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s11", name: "คิตตี้", minLvl: 70, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_m8y2yvm8y2yvm8y2-removebg-preview.png", config: { top: 47, left: 49, width: 48 } },
    { id: "s12", name: "คุโรมิ", minLvl: 75, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_2rz3th2rz3th2rz3-removebg-preview.png", config: { top: 47, left: 49, width: 48 } }
  ];

  const hatLibrary = [
    { id: "h1", name: "มาดแมน", minLvl: 0, url: "https://img2.pic.in.th/Gemini_Generated_Image_wt258awt258awt25__1_-removebg-preview.png", config: { top: 5, left: 47, width: 52 } },
    { id: "h2", name: "ชมพูฤดูหนาว", minLvl: 10, url: "https://img2.pic.in.th/Gemini_Generated_Image_wt258awt258awt25-removebg-preview.png", config: { top: 1, left: 50, width: 50 } },
    { id: "h3", name: "ฟางน่ารัก", minLvl: 20, url: "https://img2.pic.in.th/Gemini_Generated_Image_kr7ggtkr7ggtkr7g_-_Copy_-_Copy_-_Copy-removebg-preview.png", config: { top: 11, left: 50, width: 62 } },
    { id: "h4", name: "หมวกนักคิด", minLvl: 30, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_kr7ggtkr7ggtkr7g_-_Copy_-_Copy-removebg-preview.png", config: { top: 5, left: 45, width: 60 } },
    { id: "h5", name: "หมวกผู้ดี", minLvl: 40, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_kr7ggtkr7ggtkr7g_-_Copy-removebg-preview.png", config: { top: 2, left: 48, width: 65 } },
    { id: "h6", name: "หมวกท่องเที่ยว", minLvl: 45, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_kr7ggtkr7ggtkr7g-removebg-preview.png", config: { top: 10, left: 48, width: 60 } },
    { id: "h7", name: "Kitty Red", minLvl: 55, url: "https://img1.pic.in.th/images/Kitty2.png", config: { top: 10, left: 48, width: 46 } },
    { id: "h8", name: "Kitty Pink", minLvl: 65, url: "https://img1.pic.in.th/images/Kitty1.png", config: { top: 18, left: 46, width: 46 } },
    { id: "h9", name: "Kitty Gab", minLvl: 70, url: "https://img2.pic.in.th/KittyGab.png", config: { top: 10, left: 48, width: 60 } },
    { id: "h10", name: "Kuromi 01", minLvl: 75, url: "https://img2.pic.in.th/Kuromi01.png", config: { top: 18, left: 46, width: 46 } },
    { id: "h11", name: "Kuromi 02", minLvl: 77, url: "https://img1.pic.in.th/images/Kuromi02.png", config: { top: 9, left: 47, width: 55 } },
    { id: "h12", name: "Kuromi 03", minLvl: 80, url: "https://img2.pic.in.th/Kuromi03.png", config: { top: 9, left: 47, width: 53 } }
  ];

  const fullSetLibrary = [
    { id: "Farmer-cat", name: "แมวชาวสวน", minLvl: 0, url: "https://img2.pic.in.th/Farmer-cat.png", config: { width: 70 } },
    { id: "Chef-cat", name: "แมวพ่อครัว", minLvl: 40, url: "https://img1.pic.in.th/images/Chef-cat.png", config: { width: 70 } },
    { id: "Research-cat", name: "แมวนักวิจัย", minLvl: 50, url: "https://img2.pic.in.th/Research-cat.png", config: { width: 70 } },
    { id: "Magic-cat", name: "แมววิซาร์ด", minLvl: 60, url: "https://img1.pic.in.th/images/Magic-cat.png", config: { width: 70 } },
    { id: "Galaxy-cat", name: "แมวกาแล็กซี่", minLvl: 70, url: "https://img2.pic.in.th/Galaxy-cat.png", config: { width: 80 } },
    { id: "Overlord-cat", name: "ราชาเหมียว", minLvl: 80, url: "https://img2.pic.in.th/Overlord-cat.md.png", config: { width: 150 } }
  ];

  async function loadData(){
    try {
      const res = await fetch(API_URL + "?t=" + new Date().getTime());
      studentsData = await res.json();
      document.getElementById("loginBtn").disabled = false;
      document.getElementById("loginBtn").textContent = "เข้าสู่อาณาจักร";
    } catch(e) { 
      console.error(e);
      document.getElementById("loginBtn").textContent = "เกิดข้อผิดพลาดในการโหลด";
    }
  }

function login(){
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();
    currentStudent = studentsData.find(s => String(s.รหัสเข้า) === u && String(s.รหัสผ่าน) === p);
    if(!currentStudent) return alert("รหัสผิดเมี๊ยว!");
    
    const score = parseFloat(currentStudent.คะแนน) || 0;
    currentStudent.เลเวล = Math.floor(10 * Math.sqrt(score));
    
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "flex";
    
    // แสดงชื่อนักเรียนแบบปกติ
    document.getElementById("displayName").textContent = currentStudent.ชื่อ;
    
    // แสดงข้อมูลอื่น ๆ
    document.getElementById("displayLevel").textContent = currentStudent.เลเวล;
    document.getElementById("displayScore").textContent = score;

    // --- จุดที่แก้ไข: แยกชื่อชั้นมาไว้บรรทัดล่าง ---
    document.getElementById("displaySheet").textContent = currentStudent.ชั้น || "ไม่ระบุ";
    // ------------------------------------------
    
    renderInventory(); 
    renderMissions();
    
    // (ส่วนการแสดงชุดคงเดิม...)
    if(currentStudent.หมวก && fullSetLibrary.some(s => currentStudent.หมวก === s.url)) {
      applyFullSet(currentStudent.หมวก);
    } else { 
      if(currentStudent.หมวก) applyHat(currentStudent.หมวก); 
      if(currentStudent.เสื้อ) applyShirt(currentStudent.เสื้อ); 
    }
  }

  function renderInventory() {
    const lvl = currentStudent.เลเวล;
    const curShirt = document.getElementById("shirt-overlay").src;
    const curHat = document.getElementById("hat-overlay").src;
    const curSet = document.getElementById("full-set-overlay").src;
    const isSetVisible = document.getElementById("full-set-overlay").style.display === "block";

    const draw = (lib, type) => lib.map(item => {
      const lock = lvl < item.minLvl;
      let isSelected = false;
      if(type==='s' && !isSetVisible) isSelected = (curShirt.includes(item.url) && document.getElementById("shirt-overlay").style.display === "block");
      if(type==='h' && !isSetVisible) isSelected = (curHat.includes(item.url) && document.getElementById("hat-overlay").style.display === "block");
      if(type==='f') isSelected = (curSet.includes(item.url) && isSetVisible);

      const fn = type==='s' ? `applyShirt('${item.url}')` : type==='h' ? `applyHat('${item.url}')` : `applyFullSet('${item.url}')`;
      return `<div id="item-${item.id}" class="item-slot ${lock?'locked':''} ${isSelected?'selected-item':''}" onclick="${lock?'':fn}">${lock?`<span class="lvl-badge">Lv.${item.minLvl}</span>`:''}<img src="${item.url}"><br><span style="font-size:9px;">${item.name}</span></div>`;
    }).join('');

    document.getElementById("tab-shirts").innerHTML = draw(shirtLibrary, 's');
    document.getElementById("tab-hats").innerHTML = draw(hatLibrary, 'h');
    document.getElementById("tab-sets").innerHTML = draw(fullSetLibrary, 'f');
  }

  function renderMissions() {
    const missions = currentStudent.ภารกิจ || [];
    const html = missions.map((m, i) => {
      const scoreNum = parseFloat(m.score) || 0;
      const isDone = scoreNum > 0;
      // ปรับการคำนวณสีพื้นหลังให้รองรับภารกิจที่เพิ่มขึ้น
      let cls = i < 9 ? "background:#fff4e6; border-left-color:#f39c12;" : "background:#f3e5f5; border-left-color:#8e44ad;";
      const scoreText = isDone ? `<br><span style="color:#27ae60; font-weight:500;">✨ ได้รับ +${scoreNum} คะแนน</span>` : "";
      return `<div class="mission-item" style="${cls}"><span class="status-badge ${isDone?'done-bg':'wait-bg'}">${isDone?'⚔️ พิชิตสำเร็จ':'⏳ ยังไม่ทำ'}</span><b>${m.name}</b>${scoreText}</div>`;
    }).join('');
    document.getElementById("mission-list").innerHTML = "<h4 style='text-align:center;'>📜 บันทึกภารกิจ (" + missions.length + ")</h4>" + html;
  }

  function applyShirt(url){ 
    const s = document.getElementById("shirt-overlay"); 
    activeShirtConfig = shirtLibrary.find(i=>i.url===url);
    if(!activeShirtConfig) return;
    s.src=url; s.style.display="block"; 
    s.style.top=activeShirtConfig.config.top+"%"; 
    s.style.width=activeShirtConfig.config.width+"%";
    s.style.left=activeShirtConfig.config.left+"%"; 
    document.getElementById("full-set-overlay").style.display="none"; 
    document.getElementById("avatar-base").style.visibility="visible";
    renderInventory();
  }
  
  function applyHat(url){
    const h = document.getElementById("hat-overlay"); 
    activeHatConfig = hatLibrary.find(i=>i.url===url);
    if(!activeHatConfig) return;
    h.src=url; h.style.display="block"; 
    h.style.top=activeHatConfig.config.top+"%"; 
    h.style.width=activeHatConfig.config.width+"%";
    h.style.left=activeHatConfig.config.left+"%"; 
    document.getElementById("full-set-overlay").style.display="none"; 
    document.getElementById("avatar-base").style.visibility="visible";
    renderInventory();
  }

  function applyFullSet(url){
    const f = document.getElementById("full-set-overlay"); 
    const d = fullSetLibrary.find(i=>i.url===url);
    if(!d) return;
    f.src=url; f.style.display="block"; f.style.width=d.config.width+"%";
    document.getElementById("avatar-base").style.visibility="hidden"; 
    document.getElementById("shirt-overlay").style.display="none"; 
    document.getElementById("hat-overlay").style.display="none";
    renderInventory();
  }

  function clearDressing(){
    document.getElementById("shirt-overlay").style.display="none"; 
    document.getElementById("hat-overlay").style.display="none"; 
    document.getElementById("full-set-overlay").style.display="none"; 
    document.getElementById("avatar-base").style.visibility="visible";
    activeShirtConfig = null; activeHatConfig = null;
    renderInventory();
  }

  function openTab(id, btn){
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active'); btn.classList.add('active');
  }

  async function saveDressing() {
    const btn = document.getElementById("saveBtn"); 
    btn.disabled=true; btn.textContent="⏳ กำลังบันทึก...";
    let h="", s="", f="";
    if(document.getElementById("full-set-overlay").style.display==="block") f=document.getElementById("full-set-overlay").src;
    else {
      if(document.getElementById("hat-overlay").style.display==="block") h=document.getElementById("hat-overlay").src;
      if(document.getElementById("shirt-overlay").style.display==="block") s=document.getElementById("shirt-overlay").src;
    }
    const url = `${API_URL}?action=saveDressing&id=${currentStudent.รหัสเข้า}&hat=${encodeURIComponent(h)}&shirt=${encodeURIComponent(s)}&fullset=${encodeURIComponent(f)}`;
    try { 
      await fetch(url,{mode:'no-cors'}); 
      alert("บันทึกชุดลงในสมุดบันทึกสำเร็จแล้วเมี๊ยว! 🐾"); 
    } catch(e) { 
      alert("ล้มเหลวเมี๊ยว!"); 
    }
    btn.disabled=false; btn.textContent="💾 บันทึกชุด";
  }

  // --- GAME ENGINE ---
  function handleAvatarClick() {
    clickCount++; 
    clearTimeout(clickTimer); 
    clickTimer = setTimeout(() => { clickCount = 0; }, 2000);
    if(clickCount >= 5) { clickCount = 0; openGame(); }
  }

  let canvas, ctx, gameFrame, birdY, birdV, obstacles, gameScore, isGameOver, frameCount;
  const avatarImg = new Image(); const shirtImg = new Image(); const hatImg = new Image(); const setImg = new Image();

  function openGame() {
    document.getElementById("gameOverlay").style.display = "flex";
    canvas = document.getElementById("gameCanvas"); ctx = canvas.getContext("2d");
    avatarImg.src = document.getElementById("avatar-base").src;
    shirtImg.src = document.getElementById("shirt-overlay").src;
    hatImg.src = document.getElementById("hat-overlay").src;
    setImg.src = document.getElementById("full-set-overlay").src;
    birdY = 200; birdV = 0; obstacles = []; gameScore = 0; isGameOver = false; frameCount = 0;
    runGame();
  }

  function gameJump() { if(!isGameOver) birdV = -6.5; }
  function closeGame() { isGameOver = true; cancelAnimationFrame(gameFrame); document.getElementById("gameOverlay").style.display = "none"; }

  function runGame() {
    if(isGameOver) return;
    ctx.clearRect(0,0,300,400);
    ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,300,400);
    birdV += 0.32; birdY += birdV;
    
    ctx.save();
    ctx.translate(70, birdY); 
    
    const catHeight = 85;
    const catWidth = (avatarImg.naturalWidth / avatarImg.naturalHeight) * catHeight;
    
    if(document.getElementById("full-set-overlay").style.display === "block") {
      const setWidth = (setImg.naturalWidth / setImg.naturalHeight) * catHeight;
      ctx.drawImage(setImg, -setWidth/2, -catHeight/2, setWidth, catHeight);
    } else {
      ctx.drawImage(avatarImg, -catWidth/2, -catHeight/2, catWidth, catHeight);

      if(document.getElementById("shirt-overlay").style.display === "block" && activeShirtConfig) {
        const shirtScale = (activeShirtConfig.config.width / 100) * 1.1; 
        const shirtW = (shirtImg.naturalWidth / shirtImg.naturalHeight) * catHeight * shirtScale;
        const shirtH = catHeight * shirtScale;
        const sT = (activeShirtConfig.config.top / 100) * catHeight - (catHeight/2);
        const sX = ((activeShirtConfig.config.left - 50) / 100) * catHeight;
        ctx.drawImage(shirtImg, sX - (shirtW/2), sT, shirtW, shirtH);
      }

      if(document.getElementById("hat-overlay").style.display === "block" && activeHatConfig) {
        const hatScale = (activeHatConfig.config.width / 100) * 1.1; 
        const hatW = (hatImg.naturalWidth / hatImg.naturalHeight) * catHeight * hatScale;
        const hatH = catHeight * hatScale;
        const hT = ((activeHatConfig.config.top / 100) * catHeight - (catHeight/2)) - 12;
        const hX = ((activeHatConfig.config.left - 50) / 100) * catHeight;
        ctx.drawImage(hatImg, hX - (hatW/2), hT, hatW, hatH);
      }
    }
    ctx.restore();

    if(frameCount % 80 === 0) obstacles.push({x:300, w:50, h:80 + Math.random()*120, passed: false});
    frameCount++;
    obstacles.forEach((o, i) => {
      o.x -= 3.5;
      ctx.fillStyle = "#e74c3c"; ctx.fillRect(o.x, 400-o.h, o.w, o.h);
      if(o.x < 110 && o.x + o.w > 40 && birdY + 25 > 400-o.h) { 
        isGameOver = true; 
        alert("ชนกองงานแล้วเมี๊ยว! คะแนน: " + gameScore); 
        closeGame(); 
      }
      if(!o.passed && o.x < 40) { o.passed = true; gameScore++; document.getElementById("gameScoreText").textContent = gameScore; }
    });
    
    if(gameScore >= 10 && !isGameOver) {
      isGameOver = true; 
      document.getElementById("avatarClicker").classList.add("god-aura");
      setTimeout(() => { alert("⚔️ พิชิตสำเร็จเมี๊ยว! รับออร่าเทพเจ้า!"); closeGame(); }, 100);
      return;
    }
    if(birdY > 450 || birdY < -100) { isGameOver = true; alert("ตกโลกแล้วเมี๊ยว!"); closeGame(); }
    if(!isGameOver) gameFrame = requestAnimationFrame(runGame);
  }
  
  loadData();
</script>
</body>
