<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cat RPG Adventure v2.1</title> <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { 
      touch-action: pan-y; 
      -webkit-tap-highlight-color: transparent; 
      user-select: none; 
      box-sizing: border-box;
    }

    body { 
      font-family: 'Mitr', sans-serif; 
      background: #e2d1c3; 
      margin: 0; 
      padding: 0;
      overflow-x: hidden; 
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Dashboard & Cards (ล็อคขนาด 340px) */
    #dashboard { display: none; flex-direction: column; align-items: center; width: 100%; padding: 20px 0; gap: 20px; }
    .student-card, .inventory-card, .mission-card { 
      background: white; border-radius: 25px; padding: 20px; width: 340px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
    }

    /* Avatar System */
    .avatar-container { 
      width: 180px; height: 180px; margin: 0 auto 15px; background: #f9f9f9; border-radius: 50%; position: relative; 
      overflow: hidden; display: flex; justify-content: center; align-items: center; border: 5px solid #fff;
    }
    #avatar-base { width: auto; height: 85%; z-index: 1; image-rendering: pixelated; }
    #shirt-overlay, #hat-overlay { position: absolute; z-index: 2; display: none; transform: translateX(-50%); left: 50%; pointer-events: none; image-rendering: pixelated; }
    #full-set-overlay { position: absolute; z-index: 4; display: none; transform: translate(-50%, -50%); left: 50%; top: 50%; image-rendering: pixelated; }

    /* Inventory & Tabs */
    .tab-menu { display: flex; gap: 5px; margin-bottom: 15px; }
    .tab-btn { flex: 1; padding: 12px 5px; border: none; border-radius: 12px; background: #f0f0f0; font-family: 'Mitr'; font-size: 14px; cursor: pointer; }
    .tab-btn.active { background: #3498db; color: white; }
    .tab-content { display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 5px; }
    .tab-content.active { display: grid; }
    .item-slot { background: #fafafa; border: 2px solid #eee; border-radius: 15px; padding: 10px; text-align: center; position: relative; }
    .item-slot img { width: 100%; height: 55px; object-fit: contain; }
    .item-name { font-size: 10px; color: #777; display: block; margin-top: 5px; }

    /* Buttons */
    .btn-save { background: #3498db; color: white; border: none; padding: 15px; border-radius: 18px; width: 100%; font-family: 'Mitr'; font-size: 16px; cursor: pointer; margin-top: 10px; }
    .btn-clear { background: none; border: none; color: #999; font-size: 13px; margin-top: 10px; cursor: pointer; text-decoration: underline; width: 100%; }
    .btn-logout { background: none; color: #e74c3c; border: 1px dashed #e74c3c; padding: 12px; border-radius: 15px; width: 100%; margin-top: 20px; font-family: 'Mitr'; }
    
    #loginPage { background: white; padding: 30px; border-radius: 30px; width: 90%; max-width: 340px; margin-top: 60px; text-align: center; }
    .login-input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 1px solid #ddd; font-family: 'Mitr'; }
    #loginBtn { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; font-family: 'Mitr'; font-size: 16px; }
  </style>
</head>
<body>

  <div id="loginPage">
    <h2>🐾 Cat RPG</h2>
    <input type="text" id="username" class="login-input" placeholder="รหัสนักเรียน">
    <input type="password" id="password" class="login-input" placeholder="รหัสผ่าน">
    <button id="loginBtn" onclick="login()" disabled>กำลังโหลด...</button>
  </div>

  <div id="dashboard">
    <div class="student-card">
      <div class="avatar-container">
        <img id="avatar-base" src="https://img1.pic.in.th/images/Gemini_Generated_Image_v4dyj4v4dyj4v4dy-removebg-preview.md.png">
        <img id="shirt-overlay">
        <img id="hat-overlay">
        <img id="full-set-overlay">
      </div>
      <h3 id="displayName">-</h3>
      <p>⭐ เลเวล <span id="displayLevel">1</span> | 💰 <span id="displayScore">0</span></p>
      
      <button class="btn-save" id="saveBtn" onclick="saveDressing()">💾 บันทึกชุด</button>
      <button class="btn-clear" onclick="clearDressing()">❌ ถอดชุดทั้งหมด</button>
      <button class="btn-logout" onclick="logout()">ออกจากเกม</button>
    </div>

    <div class="inventory-card">
      <div class="tab-menu">
        <button class="tab-btn active" onclick="openTab('tab-shirts', this)">เสื้อ</button>
        <button class="tab-btn" onclick="openTab('tab-hats', this)">หมวก</button>
        <button class="tab-btn" onclick="openTab('tab-sets', this)">พิเศษ</button>
      </div>
      <div id="tab-shirts" class="tab-content active"></div>
      <div id="tab-hats" class="tab-content"></div>
      <div id="tab-sets" class="tab-content"></div>
    </div>

    <div class="mission-card" id="mission-list">
      <h4>📜 ภารกิจ</h4>
    </div>
  </div>

<script>
  // ใส่ API_URL และ Logic ทั้งหมดของคุณเหมือนเดิม
  const API_URL = "https://script.google.com/macros/s/AKfycbw077hY-BeyfgJxDR8VPGN5xDfXJfBR3f7Cei_DwM1KeT02i3tx7CQ8uykvOaNONzEbtA/exec";
  let studentsData = [];
  let currentStudent = null;

  // คลังไอเทม (ใส่ชุดเดิมของคุณครูมาได้เลย)
  const shirtLibrary = [
    { id: "s1", name: "เขียวเมี๊ยว", minLvl: 0, url: "https://img2.pic.in.th/Gemini_Generated_Image_4tdjo64tdjo64tdj-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s2", name: "ชมพูเมี๊ยว", minLvl: 5, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_bwizh0bwizh0bwiz-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s3", name: "เหลืองร่าเริง", minLvl: 10, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_3q5fny3q5fny3q5f-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s4", name: "ฟ้าใสเเมี๊ยว", minLvl: 15, url: "https://img2.pic.in.th/Gemini_Generated_Image_r5h5awr5h5awr5h5-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s5", name: "ขาวเมี๊ยว", minLvl: 25, url: "https://img2.pic.in.th/Gemini_Generated_Image_5t9ee35t9ee35t9e-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s6", name: "ม่วงราตรี", minLvl: 30, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_3rhvou3rhvou3rhv-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s7", name: "เสื้อนินจา", minLvl: 40, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_xwz3ddxwz3ddxwz3-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s8", name: "ผู้ดีอังกฤษ", minLvl: 45, url: "https://img2.pic.in.th/Gemini_Generated_Image_or6ug8or6ug8or6u-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s9", name: "ชุดหรูหรา", minLvl: 55, url: "https://img2.pic.in.th/Gemini_Generated_Image_auy35yauy35yauy3-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s10", name: "จักรพรรดิ", minLvl: 60, url: "https://img2.pic.in.th/Gemini_Generated_Image_yezjphyezjphyezj-removebg-preview.png", config: { top: 44, left: 49, width: 48 } },
    { id: "s11", name: "คิตตี้", minLvl: 65, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_m8y2yvm8y2yvm8y2-removebg-preview.png", config: { top: 47, left: 49, width: 48 } },
    { id: "s12", name: "คุโรมิ", minLvl: 70, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_2rz3th2rz3th2rz3-removebg-preview.png", config: { top: 47, left: 49, width: 48 } }
  ];

  const hatLibrary = [
    { id: "h1", name: "มาดแมน", minLvl: 0, url: "https://img2.pic.in.th/Gemini_Generated_Image_wt258awt258awt25__1_-removebg-preview.png", config: { top: 5, left: 47, width: 52 } },
    { id: "h2", name: "ชมพูฤดูหนาว", minLvl: 5, url: "https://img2.pic.in.th/Gemini_Generated_Image_wt258awt258awt25-removebg-preview.png", config: { top: 1, left: 50, width: 50 } },
    { id: "h3", name: "ฟางน่ารัก", minLvl: 10, url: "https://img2.pic.in.th/Gemini_Generated_Image_kr7ggtkr7ggtkr7g_-_Copy_-_Copy_-_Copy-removebg-preview.png", config: { top: 11, left: 50, width: 62 } },
    { id: "h4", name: "หมวกนักคิด", minLvl: 15, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_kr7ggtkr7ggtkr7g_-_Copy_-_Copy-removebg-preview.png", config: { top: 5, left: 45, width: 60 } },
    { id: "h5", name: "หมวกผู้ดี", minLvl: 20, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_kr7ggtkr7ggtkr7g_-_Copy-removebg-preview.png", config: { top: 2, left: 48, width: 65 } },
    { id: "h6", name: "หมวกท่องเที่ยว", minLvl: 25, url: "https://img1.pic.in.th/images/Gemini_Generated_Image_kr7ggtkr7ggtkr7g-removebg-preview.png", config: { top: 10, left: 48, width: 60 } },
    { id: "h7", name: "Kitty Red", minLvl: 30, url: "https://img1.pic.in.th/images/Kitty2.png", config: { top: 10, left: 48, width: 46 } },
    { id: "h8", name: "Kitty Pink", minLvl: 35, url: "https://img1.pic.in.th/images/Kitty1.png", config: { top: 18, left: 46, width: 46 } },
    { id: "h9", name: "Kitty Gab", minLvl: 40, url: "https://img2.pic.in.th/KittyGab.png", config: { top: 10, left: 48, width: 60 } },
    { id: "h10", name: "Kuromi 01", minLvl: 45, url: "https://img2.pic.in.th/Kuromi01.png", config: { top: 18, left: 46, width: 46 } },
    { id: "h11", name: "Kuromi 02", minLvl: 50, url: "https://img1.pic.in.th/images/Kuromi02.png", config: { top: 9, left: 47, width: 55 } },
    { id: "h12", name: "Kuromi 03", minLvl: 60, url: "https://img2.pic.in.th/Kuromi03.png", config: { top: 9, left: 47, width: 53 } }
  ];

  const fullSetLibrary = [
    { id: "Farmer-cat", name: "แมวชาวสวน", minLvl: 0, url: "https://img2.pic.in.th/Farmer-cat.png", config: { width: 70 } },
    { id: "Chef-cat", name: "แมวพ่อครัว", minLvl: 60, url: "https://img1.pic.in.th/images/Chef-cat.png", config: { width: 70 } },
    { id: "Research-cat", name: "แมวนักวิจัย", minLvl: 65, url: "https://img2.pic.in.th/Research-cat.png", config: { width: 70 } },
    { id: "Magic-cat", name: "แมววิซาร์ด", minLvl: 70, url: "https://img1.pic.in.th/images/Magic-cat.png", config: { width: 70 } },
    { id: "Galaxy-cat", name: "แมวกาแล็กซี่", minLvl: 75, url: "https://img2.pic.in.th/Galaxy-cat.png", config: { width: 80 } },
    { id: "Overlord-cat", name: "ราชาเหมียว", minLvl: 80, url: "https://img2.pic.in.th/Overlord-cat.md.png", config: { width: 150 } }
  ];

  async function loadData(){
    // เติม ?v=... เพื่อหลอก Safari ว่าเป็นไฟล์ใหม่
    try {
      const res = await fetch(API_URL + "?t=" + new Date().getTime());
      studentsData = await res.json();
      document.getElementById("loginBtn").disabled = false;
      document.getElementById("loginBtn").textContent = "เข้าสู่ระบบ";
    } catch(e) { document.getElementById("loginBtn").textContent = "Error!"; }
  }

  function login(){
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();
    currentStudent = studentsData.find(s => String(s.รหัสเข้า) === u && String(s.รหัสผ่าน) === p);
    if(!currentStudent) return alert("รหัสผิด!");
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "flex";
    document.getElementById("displayName").textContent = currentStudent.ชื่อ;
    document.getElementById("displayLevel").textContent = currentStudent.เลเวล;
    document.getElementById("displayScore").textContent = currentStudent.คะแนน;
    renderInventory();
    if(currentStudent.หมวก && fullSetLibrary.some(s => currentStudent.หมวก.includes(s.url))) applyFullSet(currentStudent.หมวก);
    else { if(currentStudent.หมวก) applyHat(currentStudent.หมวก); if(currentStudent.เสื้อ) applyShirt(currentStudent.เสื้อ); }
  }

  function openTab(id, btn){
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  function renderInventory() {
    const myLvl = parseInt(currentStudent.เลเวล) || 0;
    const draw = (lib, type) => lib.map(item => {
      const lock = myLvl < item.minLvl;
      const fn = type==='s' ? `applyShirt('${item.url}')` : type==='h' ? `applyHat('${item.url}')` : `applyFullSet('${item.url}')`;
      return `<div class="item-slot ${lock?'locked':''}" onclick="${lock?'':fn}"><img src="${item.url}"><span class="item-name">${item.name}</span></div>`;
    }).join('');
    document.getElementById("tab-shirts").innerHTML = draw(shirtLibrary, 's');
    document.getElementById("tab-hats").innerHTML = draw(hatLibrary, 'h');
    document.getElementById("tab-sets").innerHTML = draw(fullSetLibrary, 'f');
  }

  function applyShirt(url){
    document.getElementById("full-set-overlay").style.display="none";
    document.getElementById("avatar-base").style.visibility="visible";
    const s = document.getElementById("shirt-overlay");
    const d = shirtLibrary.find(i => i.url === url);
    s.src = url; s.style.display="block"; s.style.top=d.config.top+"%"; s.style.left=d.config.left+"%"; s.style.width=d.config.width+"%";
  }

  function applyHat(url){
    document.getElementById("full-set-overlay").style.display="none";
    document.getElementById("avatar-base").style.visibility="visible";
    const h = document.getElementById("hat-overlay");
    const d = hatLibrary.find(i => i.url === url);
    h.src = url; h.style.display="block"; h.style.top=d.config.top+"%"; h.style.left=d.config.left+"%"; h.style.width=d.config.width+"%";
  }

  function applyFullSet(url){
    document.getElementById("avatar-base").style.visibility="hidden";
    document.getElementById("shirt-overlay").style.display="none";
    document.getElementById("hat-overlay").style.display="none";
    const f = document.getElementById("full-set-overlay");
    const d = fullSetLibrary.find(i => i.url === url);
    f.src = url; f.style.display="block"; f.style.width=d.config.width+"%";
  }

  function clearDressing() {
    document.getElementById("shirt-overlay").style.display="none";
    document.getElementById("hat-overlay").style.display="none";
    document.getElementById("full-set-overlay").style.display="none";
    document.getElementById("avatar-base").style.visibility="visible";
  }

  async function saveDressing() {
    const btn = document.getElementById("saveBtn");
    btn.disabled = true; btn.textContent = "บันทึก...";
    let h="", s="", f="";
    if(document.getElementById("full-set-overlay").style.display==="block") f=document.getElementById("full-set-overlay").src;
    else {
      if(document.getElementById("hat-overlay").style.display==="block") h=document.getElementById("hat-overlay").src;
      if(document.getElementById("shirt-overlay").style.display==="block") s=document.getElementById("shirt-overlay").src;
    }
    const url = `${API_URL}?action=saveDressing&id=${encodeURIComponent(currentStudent.รหัสเข้า)}&hat=${encodeURIComponent(h)}&shirt=${encodeURIComponent(s)}&fullset=${encodeURIComponent(f)}`;
    try { await fetch(url, {mode:'no-cors'}); alert("สำเร็จ!"); } catch(e) { alert("พลาด!"); }
    btn.disabled = false; btn.textContent = "💾 บันทึกชุด";
  }

  function logout(){ location.reload(); }
  loadData();
</script>
</body>
</html>
